<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator Tool</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="container">

<h2>🔐 Password Tool</h2>

<div class="mode">
<button id="genBtn">Generate</button>
<button id="checkBtn">Check</button>
</div>

<!-- GENERATOR -->

<div id="generator">

<div class="result">

<span id="password"></span>

<div class="icons">
<button id="toggle"><i class="fa fa-eye"></i></button>
<button id="copy"><i class="fa fa-copy"></i></button>
</div>

</div>

<p id="copyMsg"></p>

<div class="strength">

<p>Strength: <span id="strengthText">-</span></p>

<div class="bar">
<div id="strengthBar"></div>
</div>

<p id="crackTime"></p>

</div>

<div class="settings">

<label>Password Length</label>
<input type="number" id="length" value="12" min="6" max="30">

<label><input type="checkbox" id="upper" checked> Uppercase</label>
<label><input type="checkbox" id="lower" checked> Lowercase</label>
<label><input type="checkbox" id="number" checked> Numbers</label>
<label><input type="checkbox" id="symbol" checked> Symbols</label>

</div>

<button id="generate">Generate Password</button>

</div>

<!-- CHECKER -->

<div id="checker">

<input type="text" id="checkInput" placeholder="Enter password">

<p>Strength: <span id="checkStrength"></span></p>

<div class="bar">
<div id="checkBar"></div>
</div>

<p id="checkTime"></p>

</div>

<!-- TIPS -->

<div class="tips">

<h4>Password Tips</h4>

<ul>
<li>Use 12+ characters</li>
<li>Mix letters, numbers and symbols</li>
<li>Avoid common words</li>
<li>Use unique passwords for each account</li>

</ul>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
