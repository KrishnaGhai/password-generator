<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Generator</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<h2>🔐 Password Tool</h2>

<div class="mode-buttons">
<button id="generatorBtn">Generate</button>
<button id="checkerBtn">Check Password</button>
</div>

<!-- GENERATOR SECTION -->

<div id="generatorSection">

<div class="result-container">

<span id="result"></span>

<div>

<button id="toggle">
<i class="fa fa-eye"></i>
</button>

<button id="clipboard">
<i class="fa fa-copy"></i>
</button>

</div>

</div>

<div class="strength">

Strength: <span id="strength">-</span>

<div class="strength-bar">
<div id="strength-fill"></div>
</div>

<p id="crackTime"></p>

</div>

<div class="settings">

<div class="setting">
<label>Password Length</label>
<input type="number" id="length" min="6" max="25" value="12">
</div>

<div class="setting">
<label>Uppercase</label>
<input type="checkbox" id="uppercase" checked>
</div>

<div class="setting">
<label>Lowercase</label>
<input type="checkbox" id="lowercase" checked>
</div>

<div class="setting">
<label>Numbers</label>
<input type="checkbox" id="numbers" checked>
</div>

<div class="setting">
<label>Symbols</label>
<input type="checkbox" id="symbols" checked>
</div>

</div>

<button class="btn" id="generate">Generate Password</button>

</div>

<!-- CHECKER SECTION -->

<div id="checkerSection">

<label>Enter Password</label>

<input type="text" id="manual-password">

<p>
Strength:
<span id="manual-strength">-</span>
</p>

<div class="strength-bar">
<div id="manual-fill"></div>
</div>

<p id="manualTime"></p>

</div>

<p id="copy-msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
