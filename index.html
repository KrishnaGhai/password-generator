<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Password Tool</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div class="background"></div>

<div class="container">

<h2>🔐 Password Tool</h2>

<div class="mode-buttons">

<button id="generatorBtn">Generate Password</button>

<button id="checkerBtn">Check Password</button>

</div>

<!-- PASSWORD GENERATOR -->

<div id="generatorSection">

<div class="result-container">

<span id="result"></span>

<button id="clipboard">
<i class="fa fa-copy"></i>
</button>

</div>

<div class="strength">
Strength: <span id="strength">-</span>
</div>

<div class="settings">

<div class="setting">
<label>Password Length</label>
<input type="number" id="length" min="4" max="25" value="12">
</div>

<div class="setting">
<label>Uppercase</label>
<input type="checkbox" id="uppercase" checked>
</div>

<div class="setting">
<label>Lowercase</label>
<input type="checkbox" id="lowercase" checked>
</div>

<div class="setting">
<label>Numbers</label>
<input type="checkbox" id="numbers" checked>
</div>

<div class="setting">
<label>Symbols</label>
<input type="checkbox" id="symbols" checked>
</div>

</div>

<button class="btn" id="generate">
Generate Password
</button>

</div>

<!-- PASSWORD CHECKER -->

<div id="checkerSection">

<label>Enter Password</label>

<input
type="text"
id="manual-password"
placeholder="Type your password here"
/>

<p>
Strength:
<span id="manual-strength">-</span>
</p>

</div>

<p id="copy-msg"></p>

</div>

<script src="script.js"></script>

</body>
</html>
